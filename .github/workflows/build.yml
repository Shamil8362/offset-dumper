name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Build C++ backend on Windows ──────────────────────────────────────────
  build-backend:
    name: Build C++ Backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S backend -B backend/build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build backend/build --config Release

      - name: Copy artifact
        run: copy backend\build\Release\offset_backend.exe backend\offset_backend.exe

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash backend\offset_backend.exe -Algorithm SHA256).Hash
          Write-Output "SHA256: $hash"
          Set-Content -Path backend\offset_backend.exe.sha256 -Value $hash

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: offset_backend
          path: |
            backend/offset_backend.exe
            backend/offset_backend.exe.sha256

  # ── Build Electron installer ───────────────────────────────────────────────
  build-electron:
    name: Build Electron App
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: offset_backend
          path: backend/

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OffsetDumper-installer
          path: dist/*.exe

  # ── Create GitHub Release on tag push ─────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: OffsetDumper-installer
          path: dist/

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: offset_backend
          path: backend/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            backend/offset_backend.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
